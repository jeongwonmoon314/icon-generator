<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICON FORGE — 사내 벡터 아이콘 생성기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0b0e13;
    --surface: #131820;
    --surface2: #1a2230;
    --border: #243044;
    --accent: #2d7dd2;
    --accent2: #5ba4f5;
    --text: #d4dff0;
    --text-dim: #5e7a9e;
    --text-muted: #334155;
    --success: #22c55e;
    --danger: #ef4444;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 헤더 */
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--accent2);
    text-transform: uppercase;
  }
  .logo span { color: var(--text-dim); }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .api-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background .3s;
  }
  .dot.ok { background: var(--success); }

  /* 레이아웃 */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 61px);
  }

  /* 왼쪽 패널 */
  .panel-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: var(--surface);
  }

  .section {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 12px;
  }
  input:focus, textarea:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .tag-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }
  .tag-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .tag-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .btn-generate {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .btn-generate:hover:not(:disabled) { background: #3d8de2; transform: translateY(-1px); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-generate.loading::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: rgba(255,255,255,0.5);
    animation: progress 2s linear infinite;
  }
  @keyframes progress {
    0% { width: 0; left: 0; }
    50% { width: 60%; }
    100% { width: 0; left: 100%; }
  }

  /* 프리셋 */
  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .preset-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    transition: all .15s;
    font-family: var(--sans);
  }
  .preset-item:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }
  .preset-icon { font-size: 16px; margin-bottom: 3px; }

  /* 오른쪽: 미리보기 + 아카이브 */
  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 탭 */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 24px;
  }
  .tab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 14px 0;
    margin-right: 28px;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all .2s;
  }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

  /* 미리보기 */
  .preview-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: none;
  }
  .preview-area.active { display: flex; flex-direction: column; gap: 24px; }

  .preview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    animation: fadeUp .3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .preview-swatches {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .swatch {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 16px;
    position: relative;
  }
  .swatch svg { width: 48px; height: 48px; }
  .swatch-label {
    position: absolute;
    bottom: 6px;
    font-family: var(--mono);
    font-size: 9px;
    color: rgba(255,255,255,0.2);
  }
  .swatch-dark { background: #0f1823; }
  .swatch-navy { background: #1a2744; }
  .swatch-mid { background: #e8f0fe; }
  .swatch-light { background: #ffffff; }

  .preview-actions {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
  }
  .preview-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
  }
  .btn-small {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: 0.05em;
  }
  .btn-dl { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .btn-dl:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-copy { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-copy:hover { border-color: var(--success); color: var(--success); }

  /* SVG 코드 박스 */
  .code-box {
    margin: 0 16px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    overflow-x: auto;
    white-space: pre;
    max-height: 120px;
    overflow-y: auto;
    display: none;
  }
  .code-box.visible { display: block; }

  /* 아카이브 */
  .archive-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: none;
  }
  .archive-area.active { display: block; }

  .archive-toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 4px;
    outline: none;
    margin-bottom: 0;
  }
  .search-box:focus { border-color: var(--accent); }

  .archive-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .archive-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    animation: fadeUp .25s ease;
  }
  .archive-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .archive-thumb {
    background: #1a2744;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    aspect-ratio: 1;
  }
  .archive-thumb svg { width: 48px; height: 48px; color: #5ba4f5; }
  .archive-meta {
    padding: 10px;
    border-top: 1px solid var(--border);
  }
  .archive-name {
    font-size: 12px;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .archive-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .archive-del {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: var(--text-dim);
    width: 22px; height: 22px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .archive-card:hover .archive-del { display: flex; }
  .archive-del:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  /* 토스트 */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px 18px;
    border-radius: 4px;
    opacity: 0;
    transform: translateY(8px);
    transition: all .25s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">ICON <span>//</span> FORGE</div>
  <div style="font-size:12px; color: var(--text-muted); font-family: var(--mono);">사내 벡터 아이콘 생성기</div>
  <div class="header-right">
    <div class="api-status">
      <div class="dot" id="apiDot"></div>
      <span id="apiStatusText">API 키 미설정</span>
    </div>
  </div>
</header>

<div class="layout">
  <!-- 왼쪽 패널 -->
  <div class="panel-left">

    <!-- API 키 -->
    <div class="section">
      <div class="section-title">Gemini API Key</div>
      <label>API Key (세션 중 저장됨)</label>
      <input type="password" id="apiKeyInput" placeholder="AIza...">
      <div style="font-size:11px; color:var(--text-muted); font-family:var(--mono);">
        Google AI Studio → Get API Key
      </div>
    </div>

    <!-- 아이콘 생성 -->
    <div class="section">
      <div class="section-title">아이콘 생성</div>

      <label>아이콘 설명 (영어 권장)</label>
      <textarea id="promptInput" placeholder="예: container ship side view, nuclear reactor symbol, cargo crane, anchor with chain"></textarea>

      <label>표시 이름</label>
      <input type="text" id="labelInput" placeholder="예: 컨테이너선">

      <label>태그</label>
      <div class="tag-row" id="tagRow">
        <button class="tag-btn" onclick="toggleTag(this,'선박')">선박</button>
        <button class="tag-btn" onclick="toggleTag(this,'원자력')">원자력</button>
        <button class="tag-btn" onclick="toggleTag(this,'항만')">항만</button>
        <button class="tag-btn" onclick="toggleTag(this,'물류')">물류</button>
        <button class="tag-btn" onclick="toggleTag(this,'에너지')">에너지</button>
        <button class="tag-btn" onclick="toggleTag(this,'조직')">조직</button>
        <button class="tag-btn" onclick="toggleTag(this,'프로세스')">프로세스</button>
        <button class="tag-btn" onclick="toggleTag(this,'기타')">기타</button>
      </div>

      <button class="btn-generate" id="generateBtn" onclick="generate()">
        ⚡ 아이콘 생성
      </button>
    </div>

    <!-- 프리셋 -->
    <div class="section">
      <div class="section-title">빠른 프리셋</div>
      <div class="preset-grid">
        <div class="preset-item" onclick="applyPreset('container ship side view with cargo containers on deck', '컨테이너선')">
          <div class="preset-icon">🚢</div>컨테이너선
        </div>
        <div class="preset-item" onclick="applyPreset('nuclear reactor core with radiation symbol', '원자로')">
          <div class="preset-icon">⚛️</div>원자로
        </div>
        <div class="preset-item" onclick="applyPreset('cargo crane at port', '항만 크레인')">
          <div class="preset-icon">🏗️</div>항만 크레인
        </div>
        <div class="preset-item" onclick="applyPreset('ship anchor with chain', '앵커')">
          <div class="preset-icon">⚓</div>앵커
        </div>
        <div class="preset-item" onclick="applyPreset('tanker ship side view', '탱커선')">
          <div class="preset-icon">🛢️</div>탱커선
        </div>
        <div class="preset-item" onclick="applyPreset('propeller with three blades', '프로펠러')">
          <div class="preset-icon">🌀</div>프로펠러
        </div>
        <div class="preset-item" onclick="applyPreset('nuclear power plant with cooling towers', '원전')">
          <div class="preset-icon">🏭</div>원전
        </div>
        <div class="preset-item" onclick="applyPreset('shipping container box isometric', '컨테이너')">
          <div class="preset-icon">📦</div>컨테이너
        </div>
        <div class="preset-item" onclick="applyPreset('radar circle with scan lines', '레이더')">
          <div class="preset-icon">📡</div>레이더
        </div>
        <div class="preset-item" onclick="applyPreset('compass rose with cardinal directions', '나침반')">
          <div class="preset-icon">🧭</div>나침반
        </div>
        <div class="preset-item" onclick="applyPreset('tugboat small vessel', '예인선')">
          <div class="preset-icon">🚤</div>예인선
        </div>
        <div class="preset-item" onclick="applyPreset('organizational chart hierarchy', '조직도')">
          <div class="preset-icon">📊</div>조직도
        </div>
      </div>
    </div>

  </div>

  <!-- 오른쪽 패널 -->
  <div class="panel-right">
    <div class="tabs">
      <div class="tab active" id="tab-preview" onclick="switchTab('preview')">미리보기</div>
      <div class="tab" id="tab-archive" onclick="switchTab('archive')">
        아카이브 <span id="archiveCount" style="font-size:10px; opacity:.5;"></span>
      </div>
    </div>

    <!-- 미리보기 탭 -->
    <div class="preview-area active" id="view-preview">
      <div class="empty-state" id="emptyPreview">
        <div class="empty-icon">◈</div>
        아이콘을 생성하면 여기에 표시됩니다
      </div>
      <div id="previewList"></div>
    </div>

    <!-- 아카이브 탭 -->
    <div class="archive-area" id="view-archive">
      <div class="archive-toolbar">
        <input class="search-box" type="text" id="searchInput" placeholder="검색..." oninput="renderArchive()">
      </div>
      <div class="archive-grid" id="archiveGrid"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let archive = [];
let selectedTags = [];

// 초기화
window.onload = async () => {
  document.getElementById('apiKeyInput').addEventListener('input', updateApiStatus);
  await loadArchive();
};

function updateApiStatus() {
  const key = document.getElementById('apiKeyInput').value.trim();
  document.getElementById('apiDot').className = 'dot' + (key ? ' ok' : '');
  document.getElementById('apiStatusText').textContent = key ? 'API 키 설정됨' : 'API 키 미설정';
}

async function loadArchive() {
  try {
    const r = await fetch('/api/archive');
    archive = await r.json();
    renderArchive();
    document.getElementById('archiveCount').textContent = `(${archive.length})`;
  } catch(e) {}
}

function toggleTag(btn, tag) {
  btn.classList.toggle('active');
  if (selectedTags.includes(tag)) selectedTags = selectedTags.filter(t => t !== tag);
  else selectedTags.push(tag);
}

function applyPreset(prompt, label) {
  document.getElementById('promptInput').value = prompt;
  document.getElementById('labelInput').value = label;
  document.getElementById('promptInput').focus();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.preview-area, .archive-area').forEach(a => a.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
}

async function generate() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const prompt = document.getElementById('promptInput').value.trim();
  const label = document.getElementById('labelInput').value.trim() || prompt.slice(0, 20);

  if (!apiKey) { toast('⚠️ API 키를 입력하세요'); return; }
  if (!prompt) { toast('⚠️ 아이콘 설명을 입력하세요'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '생성 중...';
  document.getElementById('emptyPreview').style.display = 'none';

  try {
    const r = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey, prompt, label, tags: selectedTags })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);

    addPreviewCard(data.svg, label, data.id);
    await loadArchive();
    toast('✓ 아이콘 생성 완료 — 아카이브에 저장됨');
  } catch(e) {
    toast('✗ 오류: ' + e.message);
    document.getElementById('emptyPreview').style.display = '';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '⚡ 아이콘 생성';
  }
}

function addPreviewCard(svg, label, id) {
  const list = document.getElementById('previewList');
  const card = document.createElement('div');
  card.className = 'preview-card';
  const codeId = 'code_' + id;
  card.innerHTML = `
    <div class="preview-swatches">
      <div class="swatch swatch-dark" style="color:#5ba4f5">${svg}<div class="swatch-label">DARK</div></div>
      <div class="swatch swatch-navy" style="color:#a3c4f5">${svg}<div class="swatch-label">NAVY</div></div>
      <div class="swatch swatch-mid" style="color:#1a3a6e">${svg}<div class="swatch-label">LIGHT BG</div></div>
      <div class="swatch swatch-light" style="color:#1e3a5f">${svg}<div class="swatch-label">WHITE</div></div>
    </div>
    <div class="preview-actions">
      <span class="preview-label">${label}</span>
      <button class="btn-small btn-copy" onclick="toggleCode('${codeId}')">SVG 코드</button>
      <button class="btn-small btn-dl" onclick="downloadSvg(\`${svg.replace(/`/g,'\\`')}\`, '${label}')">↓ 다운로드</button>
    </div>
    <pre class="code-box" id="${codeId}">${escHtml(svg)}</pre>
  `;
  list.insertBefore(card, list.firstChild);
}

function toggleCode(id) {
  const el = document.getElementById(id);
  el.classList.toggle('visible');
  if (el.classList.contains('visible')) {
    navigator.clipboard.writeText(el.textContent).catch(()=>{});
    toast('✓ SVG 코드 복사됨');
  }
}

function downloadSvg(svg, label) {
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = label.replace(/\s+/g, '_') + '.svg';
  a.click();
  toast('✓ 다운로드 완료');
}

function renderArchive() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = archive.filter(i =>
    i.label.toLowerCase().includes(q) ||
    i.prompt.toLowerCase().includes(q) ||
    (i.tags || []).join(' ').toLowerCase().includes(q)
  );
  const grid = document.getElementById('archiveGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">◈</div>${archive.length ? '검색 결과 없음' : '아직 생성된 아이콘이 없습니다'}</div>`;
    return;
  }
  grid.innerHTML = filtered.map(item => `
    <div class="archive-card" onclick="loadFromArchive('${item.id}')">
      <div class="archive-thumb" style="color:#5ba4f5">${item.svg}</div>
      <div class="archive-meta">
        <div class="archive-name">${item.label}</div>
        <div class="archive-date">${item.createdAt}</div>
      </div>
      <button class="archive-del" onclick="event.stopPropagation();deleteIcon('${item.id}')" title="삭제">✕</button>
    </div>
  `).join('');
}

function loadFromArchive(id) {
  const item = archive.find(i => i.id === id);
  if (!item) return;
  switchTab('preview');
  document.getElementById('emptyPreview').style.display = 'none';
  addPreviewCard(item.svg, item.label, item.id + '_view');
  document.getElementById('promptInput').value = item.prompt;
  document.getElementById('labelInput').value = item.label;
  toast('✓ 아카이브에서 불러옴');
}

async function deleteIcon(id) {
  if (!confirm('이 아이콘을 삭제하시겠습니까?')) return;
  await fetch('/api/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  await loadArchive();
  toast('✓ 삭제됨');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
